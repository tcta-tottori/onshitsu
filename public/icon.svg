<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ONSHITSU">
  <defs>
    <!-- 夜の濃紺グラデ（中央やや明るく、四隅は暗く） -->
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#20304f" />
      <stop offset="55%" stop-color="#141f36" />
      <stop offset="100%" stop-color="#0a1120" />
    </radialGradient>
    <linearGradient id="temp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a742" />
      <stop offset="100%" stop-color="#f6b955" />
    </linearGradient>
    <linearGradient id="humid" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ecae6" />
      <stop offset="100%" stop-color="#a9dcef" />
    </linearGradient>
    <filter id="glowA" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowC" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowM" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
    <clipPath id="round">
      <rect x="16" y="16" width="480" height="480" rx="112" ry="112" />
    </clipPath>
  </defs>

  <!-- 角丸スクエア背景 -->
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="url(#bg)" />

  <g clip-path="url(#round)">
    <!-- 上部のほのかな光（夕暮れ→夜） -->
    <ellipse cx="256" cy="70" rx="260" ry="150" fill="#2a3c60" opacity="0.35" filter="url(#glowM)" />

    <!-- 縦のグリッド線 -->
    <g stroke="#ffffff" stroke-opacity="0.07" stroke-width="3">
      <line x1="140" y1="150" x2="140" y2="382" />
      <line x1="256" y1="150" x2="256" y2="382" />
      <line x1="372" y1="150" x2="372" y2="382" />
    </g>

    <!-- 月（三日月）＋きらめき -->
    <g filter="url(#glowM)" opacity="0.55">
      <circle cx="300" cy="96" r="40" fill="#dfe8ff" />
    </g>
    <g>
      <path d="M 322 68 A 38 38 0 1 0 322 124 A 30 30 0 1 1 322 68 Z" fill="#f4f7ff" />
      <!-- きらめき（4点星） -->
      <path d="M 356 60 L 361 76 L 377 81 L 361 86 L 356 102 L 351 86 L 335 81 L 351 76 Z" fill="#f4f7ff" />
    </g>

    <!-- 湿度カーブ（寒色・S字で右上へ） -->
    <g filter="url(#glowC)">
      <path d="M 78 336 C 150 330, 188 300, 234 262 C 286 218, 330 168, 442 150"
            stroke="url(#humid)" stroke-width="11" stroke-linecap="round" fill="none" />
    </g>
    <!-- 気温カーブ（暖色・山なり） -->
    <g filter="url(#glowA)">
      <path d="M 70 300 C 120 296, 158 182, 210 182 C 262 182, 302 268, 360 286 C 398 298, 420 300, 442 300"
            stroke="url(#temp)" stroke-width="11" stroke-linecap="round" fill="none" />
    </g>

    <!-- データ点 -->
    <g>
      <!-- 気温 -->
      <circle cx="70" cy="300" r="10" fill="#f6b955" stroke="#fff" stroke-opacity="0.5" stroke-width="2" />
      <circle cx="210" cy="182" r="11" fill="#f6b955" stroke="#fff" stroke-opacity="0.6" stroke-width="2" />
      <circle cx="442" cy="300" r="10" fill="#f6b955" stroke="#fff" stroke-opacity="0.5" stroke-width="2" />
      <!-- 湿度 -->
      <circle cx="78" cy="336" r="10" fill="#a9dcef" stroke="#fff" stroke-opacity="0.5" stroke-width="2" />
      <circle cx="234" cy="262" r="10" fill="#a9dcef" stroke="#fff" stroke-opacity="0.5" stroke-width="2" />
      <circle cx="442" cy="150" r="11" fill="#a9dcef" stroke="#fff" stroke-opacity="0.6" stroke-width="2" />
    </g>
  </g>

  <!-- 内側のふち（アイコンのベベル感） -->
  <rect x="17.5" y="17.5" width="477" height="477" rx="110.5" ry="110.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3" />
</svg>

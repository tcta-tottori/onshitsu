name: Deploy to GitHub Pages

on:
  push:
    # main を正とするが、リポジトリのデフォルトブランチが作業ブランチのままだと
    # GitHub Pages 環境が main からのデプロイを拒否するため、作業ブランチでもデプロイ可能にする。
    # （デフォルトブランチを main に変更した場合は branches: [main] のみで十分）
    branches:
      - main
      - claude/yotsuyu-night-weather-app-0b3puq
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに絞る（進行中のデプロイはキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

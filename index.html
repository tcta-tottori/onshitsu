<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" sizes="48x48" href="/onshitsu/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/onshitsu/favicon-32.png" />
    <link rel="apple-touch-icon" href="/onshitsu/apple-touch-icon.png" />
    <link rel="manifest" href="/onshitsu/manifest.webmanifest" />
    <meta
      name="description"
      content="ONSHITSU（音質ではなく、夜の湿度）— 今夜の気温と湿度に特化した天気予報。鳥取の夜の冷え込みと湿り具合を一目で。"
    />
    <title>ONSHITSU — 今夜の気温×湿度</title>
    <script>
      /* 本アプリはダーク固定（夜のアプリ）。 */
      document.documentElement.setAttribute('data-theme', 'dark')
    </script>
    <style>
      /* 起動ローダー：気象データの読込が終わるまで表示し続ける（React が __bootFinish を呼ぶ）。
         シンプルに、上下に揺れる三日月ときらめく星のみ。 */
      #boot {
        --boot-bg1: #141f36;
        --boot-bg2: #0a1120;
        --boot-moon: #f4f7ff;
        --boot-moon-glow: rgba(190, 208, 255, 0.4);
        --boot-text: #aeb9d6;
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: linear-gradient(180deg, var(--boot-bg1), var(--boot-bg2));
        font-family: system-ui, -apple-system, 'Hiragino Kaku Gothic ProN',
          'Noto Sans JP', sans-serif;
        transition: opacity 0.4s ease;
      }
      #boot.boot-hide {
        opacity: 0;
        pointer-events: none;
      }

      /* 三日月と星をまとめる舞台 */
      .boot-stage {
        position: relative;
        width: 180px;
        height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 昇る三日月＋光輪＋きらめき。ゆっくり上下に揺れる。 */
      .moon {
        position: relative;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--boot-moon);
        box-shadow: 0 0 30px 7px var(--boot-moon-glow);
        animation: moonrise 2.6s ease-in-out infinite;
      }
      .moon::after {
        content: '';
        position: absolute;
        top: -6px;
        right: -6px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: linear-gradient(180deg, var(--boot-bg1), var(--boot-bg2));
      }
      .moon::before {
        content: '';
        position: absolute;
        top: -13px;
        right: -20px;
        width: 18px;
        height: 18px;
        background: var(--boot-moon);
        clip-path: polygon(50% 0, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0 50%, 40% 40%);
        box-shadow: 0 0 12px 2px var(--boot-moon-glow);
        animation: sparkle 1.8s ease-in-out infinite;
        z-index: 2;
      }
      @keyframes moonrise {
        0%, 100% { transform: translateY(6px); }
        50% { transform: translateY(-6px); }
      }

      /* きらめく星（4点星）。舞台いっぱいに散らす。 */
      .stars {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .stars i {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #dbe4ff;
        /* 4点星の形 */
        clip-path: polygon(50% 0, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0 50%, 40% 40%);
        opacity: 0.5;
        filter: drop-shadow(0 0 4px rgba(200, 214, 255, 0.6));
        animation: sparkle 1.8s ease-in-out infinite;
      }
      .stars i:nth-child(1) { left: 8%;  top: 22%; width: 12px; height: 12px; animation-delay: 0s; }
      .stars i:nth-child(2) { left: 86%; top: 16%; width: 9px;  height: 9px;  animation-delay: 0.5s; }
      .stars i:nth-child(3) { left: 92%; top: 58%; width: 11px; height: 11px; animation-delay: 1s; }
      .stars i:nth-child(4) { left: 4%;  top: 62%; width: 8px;  height: 8px;  animation-delay: 1.4s; }
      .stars i:nth-child(5) { left: 72%; top: 74%; width: 10px; height: 10px; animation-delay: 0.8s; }
      .stars i:nth-child(6) { left: 22%; top: 80%; width: 7px;  height: 7px;  animation-delay: 0.3s; }
      @keyframes sparkle {
        0%, 100% { opacity: 0.15; transform: scale(0.6) rotate(0deg); }
        50% { opacity: 1; transform: scale(1.15) rotate(45deg); }
      }

      .boot-pct {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.1em;
        color: var(--boot-text);
        font-variant-numeric: tabular-nums;
      }

      @media (prefers-reduced-motion: reduce) {
        .moon, .stars i, .moon::before { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot">
      <div class="boot-stage">
        <div class="stars" aria-hidden="true">
          <i></i><i></i><i></i><i></i><i></i><i></i>
        </div>
        <div class="moon" aria-hidden="true"></div>
      </div>
      <div class="boot-pct" id="boot-pct">Loading... 0%</div>
    </div>
    <script>
      /* 読込%の演出：完了までは 92% までゆっくり近づき、__bootFinish で 100%→フェード。 */
      (function () {
        var pct = 0,
          finished = false
        var el = document.getElementById('boot-pct')
        function render() {
          if (el) el.textContent = 'Loading... ' + Math.round(pct) + '%'
        }
        var iv = setInterval(function () {
          if (finished) return
          var target = 92
          pct += (target - pct) * 0.045 + 0.35
          if (pct > target) pct = target
          render()
        }, 90)
        window.__bootFinish = function () {
          if (finished) return
          finished = true
          clearInterval(iv)
          pct = 100
          render()
          var boot = document.getElementById('boot')
          if (!boot) return
          // 100% を一瞬見せてからフェードアウト
          setTimeout(function () {
            boot.classList.add('boot-hide')
            setTimeout(function () {
              boot.style.display = 'none'
            }, 460)
          }, 240)
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

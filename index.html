<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" sizes="48x48" href="/onshitsu/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/onshitsu/favicon-32.png" />
    <link rel="apple-touch-icon" href="/onshitsu/apple-touch-icon.png" />
    <link rel="manifest" href="/onshitsu/manifest.webmanifest" />
    <meta
      name="description"
      content="ONSHITSU（音質ではなく、夜の湿度）— 今夜の気温と湿度に特化した天気予報。鳥取の夜の冷え込みと湿り具合を一目で。"
    />
    <title>ONSHITSU — 今夜の気温×湿度</title>
    <script>
      /* 本アプリはダーク固定（夜のアプリ）。 */
      document.documentElement.setAttribute('data-theme', 'dark')
    </script>
    <style>
      /* 起動ローダー：気象データの読込が終わるまで表示し続ける（React が __bootFinish を呼ぶ）。
         アイコンの世界観：上下に揺れる三日月＋その下でアイコン風の交差グラフが描かれる。 */
      #boot {
        --boot-bg1: #141f36;
        --boot-bg2: #0a1120;
        --boot-moon: #f4f7ff;
        --boot-moon-glow: rgba(190, 208, 255, 0.4);
        --boot-text: #93a1bd;
        --boot-temp: #f6a83e;
        --boot-humid: #7fd3ef;
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: linear-gradient(180deg, var(--boot-bg1), var(--boot-bg2));
        font-family: system-ui, -apple-system, 'Hiragino Kaku Gothic ProN',
          'Noto Sans JP', sans-serif;
        transition: opacity 0.4s ease;
      }
      #boot.boot-hide {
        opacity: 0;
        pointer-events: none;
      }

      /* 月＋グラフをまとめる舞台 */
      .boot-stage {
        position: relative;
        width: 168px;
        height: 178px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 20px;
        padding-top: 18px;
      }

      /* 昇る三日月＋光輪＋きらめき。ゆっくり上下に揺れる。 */
      .moon {
        position: relative;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--boot-moon);
        box-shadow: 0 0 30px 7px var(--boot-moon-glow);
        animation: moonrise 2.6s ease-in-out infinite;
      }
      .moon::after {
        content: '';
        position: absolute;
        top: -6px;
        right: -6px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: linear-gradient(180deg, var(--boot-bg1), var(--boot-bg2));
      }
      .moon::before {
        content: '';
        position: absolute;
        top: -13px;
        right: -20px;
        width: 18px;
        height: 18px;
        background: var(--boot-moon);
        clip-path: polygon(50% 0, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0 50%, 40% 40%);
        box-shadow: 0 0 12px 2px var(--boot-moon-glow);
        animation: twinkle 1.8s ease-in-out infinite;
        z-index: 2;
      }
      @keyframes moonrise {
        0%, 100% { transform: translateY(6px); }
        50% { transform: translateY(-6px); }
      }

      /* アイコン風の交差グラフ（気温↓×湿度↑）。描かれては流れる。 */
      .boot-graph {
        width: 150px;
        height: 84px;
        overflow: visible;
      }
      .bg-line {
        fill: none;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-dasharray: 220;
        stroke-dashoffset: 220;
        filter: drop-shadow(0 0 5px currentColor);
        animation: draw 2.6s ease-in-out infinite;
      }
      .bg-line.temp {
        stroke: var(--boot-temp);
        color: var(--boot-temp);
      }
      .bg-line.humid {
        stroke: var(--boot-humid);
        color: var(--boot-humid);
        animation-delay: 0.25s;
      }
      .bg-dot {
        animation: dotpulse 2.6s ease-in-out infinite;
      }
      @keyframes draw {
        0% { stroke-dashoffset: 220; }
        45% { stroke-dashoffset: 0; }
        70% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -220; }
      }
      @keyframes dotpulse {
        0%, 40% { opacity: 0; transform: scale(0.6); }
        55%, 70% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(0.6); }
      }

      /* 星のまたたき */
      .stars {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .stars i {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #cbd5f5;
        opacity: 0.7;
        animation: twinkle 1.8s ease-in-out infinite;
      }
      .stars i:nth-child(1) { left: 12%; top: 14%; animation-delay: 0s; }
      .stars i:nth-child(2) { left: 84%; top: 10%; animation-delay: 0.4s; }
      .stars i:nth-child(3) { left: 90%; top: 40%; animation-delay: 0.8s; }
      .stars i:nth-child(4) { left: 6%; top: 44%; animation-delay: 1.2s; }
      .stars i:nth-child(5) { left: 74%; top: 30%; animation-delay: 0.6s; }
      @keyframes twinkle {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 0.9; transform: scale(1.2); }
      }

      .bl-text {
        font-size: 14px;
        color: #e6edff;
        font-weight: 800;
        letter-spacing: 0.22em;
      }
      .boot-pct {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        color: var(--boot-text);
        font-variant-numeric: tabular-nums;
      }

      @media (prefers-reduced-motion: reduce) {
        .moon, .stars i, .moon::before { animation: none; }
        .bg-line { animation: none; stroke-dashoffset: 0; }
        .bg-dot { animation: none; opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot">
      <div class="boot-stage">
        <div class="stars" aria-hidden="true">
          <i></i><i></i><i></i><i></i><i></i>
        </div>
        <div class="moon" aria-hidden="true"></div>
        <svg class="boot-graph" viewBox="0 0 160 90" aria-hidden="true">
          <!-- 気温：左上→右下（下降） -->
          <path class="bg-line temp" d="M10 24 C 58 24, 70 64, 150 68" />
          <!-- 湿度：左下→右上（上昇） -->
          <path class="bg-line humid" d="M10 68 C 62 68, 88 26, 150 22" />
          <circle class="bg-dot" cx="150" cy="68" r="4" fill="#f6a83e" />
          <circle class="bg-dot" cx="150" cy="22" r="4" fill="#7fd3ef" />
        </svg>
      </div>
      <div class="bl-text">ONSHITSU</div>
      <div class="boot-pct" id="boot-pct">0%</div>
    </div>
    <script>
      /* 読込%の演出：完了までは 92% までゆっくり近づき、__bootFinish で 100%→フェード。 */
      (function () {
        var pct = 0,
          finished = false
        var el = document.getElementById('boot-pct')
        function render() {
          if (el) el.textContent = Math.round(pct) + '%'
        }
        var iv = setInterval(function () {
          if (finished) return
          var target = 92
          pct += (target - pct) * 0.045 + 0.35
          if (pct > target) pct = target
          render()
        }, 90)
        window.__bootFinish = function () {
          if (finished) return
          finished = true
          clearInterval(iv)
          pct = 100
          render()
          var boot = document.getElementById('boot')
          if (!boot) return
          // 100% を一瞬見せてからフェードアウト
          setTimeout(function () {
            boot.classList.add('boot-hide')
            setTimeout(function () {
              boot.style.display = 'none'
            }, 460)
          }, 240)
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

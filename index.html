<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" sizes="48x48" href="/onshitsu/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/onshitsu/favicon-32.png" />
    <link rel="apple-touch-icon" href="/onshitsu/apple-touch-icon.png" />
    <link rel="manifest" href="/onshitsu/manifest.webmanifest" />
    <meta
      name="description"
      content="ONSHITSU（音質ではなく、夜の湿度）— 今夜の気温と湿度に特化した天気予報。鳥取の夜の冷え込みと湿り具合を一目で。"
    />
    <title>ONSHITSU — 今夜の気温×湿度</title>
    <script>
      /* 本アプリはダーク固定（夜のアプリ）。 */
      document.documentElement.setAttribute('data-theme', 'dark')
    </script>
    <style>
      /* 起動ローダー：気象データの読込が終わるまで表示し続ける（React が __bootFinish を呼ぶ）。
         温度計アイコンの中身（オレンジのゲージ）が上下するアニメーション。 */
      #boot {
        --boot-bg1: #141f36;
        --boot-bg2: #0a1120;
        --boot-merc: #f6a83e;
        --boot-merc-glow: rgba(246, 168, 62, 0.55);
        --boot-glass: rgba(126, 146, 196, 0.16);
        --boot-outline: #e8eefc;
        --boot-scale: #cdd8f4;
        --boot-text: #aeb9d6;
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: linear-gradient(180deg, var(--boot-bg1), var(--boot-bg2));
        font-family: system-ui, -apple-system, 'Hiragino Kaku Gothic ProN',
          'Noto Sans JP', sans-serif;
        transition: opacity 0.4s ease;
      }
      #boot.boot-hide {
        opacity: 0;
        pointer-events: none;
      }

      /* 温度計を置く舞台 */
      .boot-stage {
        position: relative;
        width: 150px;
        height: 170px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .thermo {
        width: 60px;
        height: 85px;
        display: block;
      }
      /* 空のガラス管（中身が無い部分） */
      .thermo-glass {
        fill: var(--boot-glass);
      }
      /* オレンジの水銀（バルブ＋ゲージ）。ゲージが上下する。 */
      .thermo-fill {
        filter: drop-shadow(0 0 6px var(--boot-merc-glow));
      }
      .thermo-bulb {
        fill: var(--boot-merc);
      }
      /* 水銀（ゲージ）は読込%に合わせて下から上へ伸びる。
         --fill（0〜1）を JS が更新し、なめらかに上昇する。 */
      .thermo-merc {
        fill: var(--boot-merc);
        transform-box: fill-box;
        transform-origin: 50% 100%;
        transform: scaleY(var(--fill, 0.08));
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      /* 管とバルブの輪郭 */
      .thermo-outline {
        fill: none;
        stroke: var(--boot-outline);
        stroke-width: 8;
      }
      /* 右側の目盛り */
      .thermo-scale line {
        stroke: var(--boot-scale);
        stroke-width: 7;
        stroke-linecap: round;
        opacity: 0.85;
      }

      .boot-pct {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.1em;
        color: var(--boot-text);
        font-variant-numeric: tabular-nums;
      }

      @media (prefers-reduced-motion: reduce) {
        /* モーション低減時は上昇アニメを省き、%に応じた高さへ即座に反映。 */
        .thermo-merc { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot">
      <div class="boot-stage">
        <svg class="thermo" viewBox="0 0 120 170" aria-hidden="true">
          <defs>
            <clipPath id="thermoClip">
              <path d="M48,26 a12,12 0 0 1 24,0 L72,104 a26,26 0 1 1 -24,0 Z" />
            </clipPath>
          </defs>
          <!-- 空のガラス -->
          <path
            class="thermo-glass"
            d="M48,26 a12,12 0 0 1 24,0 L72,104 a26,26 0 1 1 -24,0 Z"
          />
          <!-- オレンジの中身（上下するゲージ） -->
          <g class="thermo-fill" clip-path="url(#thermoClip)">
            <circle class="thermo-bulb" cx="60" cy="127" r="27" />
            <rect class="thermo-merc" x="48" y="24" width="24" height="103" />
          </g>
          <!-- 輪郭 -->
          <path
            class="thermo-outline"
            d="M48,26 a12,12 0 0 1 24,0 L72,104 a26,26 0 1 1 -24,0 Z"
          />
          <!-- 目盛り -->
          <g class="thermo-scale">
            <line x1="80" y1="34" x2="101" y2="34" />
            <line x1="80" y1="52" x2="101" y2="52" />
            <line x1="80" y1="70" x2="101" y2="70" />
            <line x1="80" y1="88" x2="96" y2="88" />
            <line x1="80" y1="106" x2="96" y2="106" />
          </g>
        </svg>
      </div>
      <div class="boot-pct" id="boot-pct">Loading... 0%</div>
    </div>
    <script>
      /* 読込%の演出：完了までは 92% までゆっくり近づき、__bootFinish で 100%→フェード。
         データが早く揃っても、読込画面は最低2秒間は表示する。 */
      (function () {
        var pct = 0,
          finished = false
        var MIN_MS = 2000
        var startedAt = Date.now()
        var el = document.getElementById('boot-pct')
        var merc = document.querySelector('.thermo-merc')
        function render() {
          if (el) el.textContent = 'Loading... ' + Math.round(pct) + '%'
          // 水銀の高さ（scaleY 0.08〜1.0）を読込%に合わせて上昇させる。
          if (merc) merc.style.setProperty('--fill', (0.08 + 0.92 * (pct / 100)).toFixed(3))
        }
        var iv = setInterval(function () {
          if (finished) return
          var target = 92
          pct += (target - pct) * 0.045 + 0.35
          if (pct > target) pct = target
          render()
        }, 90)
        window.__bootFinish = function () {
          if (finished) return
          // 最低表示時間（2秒）に満たなければ、残り時間だけ待ってから完了させる
          var remain = MIN_MS - (Date.now() - startedAt)
          if (remain > 0) {
            setTimeout(window.__bootFinish, remain)
            return
          }
          finished = true
          clearInterval(iv)
          pct = 100
          render()
          var boot = document.getElementById('boot')
          if (!boot) return
          // 100% を一瞬見せてからフェードアウト
          setTimeout(function () {
            boot.classList.add('boot-hide')
            setTimeout(function () {
              boot.style.display = 'none'
            }, 460)
          }, 240)
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
